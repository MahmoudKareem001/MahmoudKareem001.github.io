
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qadeem Stores Employee Login</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.15);width:350px}
input{width:100%;padding:10px;margin:8px 0}
button{width:100%;padding:10px;background:#222;color:#fff;border:0;border-radius:8px}
</style>
</head>
<body>
<div class="card">
<h2>دخول الموظفين</h2>
<input id="u" placeholder="اسم المستخدم">
<input id="p" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>
<p>اسم المستخدم: mahmoud<br>كلمة المرور: Mahmoud@2005</p>
</div>
<script>
function login(){
 const user=document.getElementById('u').value;
 const pass=document.getElementById('p').value;
 if(user==='mahmoud' && pass==='Mahmoud@2005'){
   alert('تم تسجيل الدخول بنجاح');
 }else{
   alert('بيانات الدخول غير صحيحة');
 }
}
</script>
</body>
</html>
